# Silk Audio Visualizer — Default Configuration
# All parameters can be overridden via --config path/to/config.yaml

# ── Canvas ────────────────────────────────────────────────────────────────────
background_color: [3, 3, 8] # Deep near-black blue

# ── Cloth Simulation ──────────────────────────────────────────────────────────
n_cloths: 2 # Overlapping cloth panels (1–4)
cloth_rows: 22 # Particle rows per cloth  (vertical res)
cloth_cols: 34 # Particle columns per cloth (horizontal res)
cloth_stiffness: 0.70 # Spring stiffness 0–1
cloth_damping: 0.972 # Verlet velocity damping per frame
constraint_iterations: 5 # Spring-solver passes per frame (3–8)

# ── Audio-Driven Forces ───────────────────────────────────────────────────────
bass_wave_amp: 130.0 # Bass energy → lateral wave amplitude (px/s²)
beat_snap_force: 220.0 # Beat onset → sharp directional snap
turbulence_scale: 35.0 # Highs → random per-particle turbulence
cloth_min_force: 12.0 # Minimum lateral motion during silence

# ── Centre Sphere (set to 0 to disable) ──────────────────────────────────────
sphere_base_radius: 0.0 # Base radius in pixels — 0 = off
sphere_pulse_scale: 0.45

# ── Colour ────────────────────────────────────────────────────────────────────
hue_drift_speed: 0.00015 # Global hue shift per frame (very slow drift)

# ── Rendering ─────────────────────────────────────────────────────────────────
trail_decay: 0.82 # Frame fade multiplier (lower = longer trails)
bloom_threshold: 145 # Pixel brightness above which bloom applies
bloom_blur: 22 # Gaussian glow radius in pixels

# ── Audio Smoothing (exponential moving average) ──────────────────────────────
smoothing_bass: 0.72
smoothing_mids: 0.62
smoothing_highs: 0.50
smoothing_rms: 0.68
